name: Trigger auto deployment for containeruas039

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/containeruas039-AutoDeployTrigger-123a4906-8a47-461a-a0d1-4a4eb7c49e2a.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTAINERUAS039_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERUAS039_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERUAS039_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: absensicr.azurecr.io
          registryUsername: ${{ secrets.CONTAINERUAS039_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERUAS039_REGISTRY_PASSWORD }}
          containerAppName: containeruas039
          resourceGroup: projek_cc_kel4
          imageToBuild: absensicr.azurecr.io/containeruas039:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


